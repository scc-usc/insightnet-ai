steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/insightnet-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/insightnet-backend:latest
      - .

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [push, "--all-tags", "gcr.io/$PROJECT_ID/insightnet-backend"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - insightnet-backend
      - --image=gcr.io/$PROJECT_ID/insightnet-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-secrets=FIREBASE_SERVICE_ACCOUNT_JSON=firebase-sa:latest,OPENROUTER_API_KEY=openrouter-key:latest,GITHUB_TOKEN=github-token:latest
      - --set-env-vars=FRONTEND_URL=https://insightnet-eta.vercel.app,ENV=production,ADMIN_UIDS=YOUR_UID_HERE

images:
  - gcr.io/$PROJECT_ID/insightnet-backend

options:
  logging: CLOUD_LOGGING_ONLY
