steps:
  # 1. Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/insightnet-repo/insightnet-backend:${_TAG}
      - .

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/insightnet-repo/insightnet-backend:${_TAG}

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - insightnet-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/insightnet-repo/insightnet-backend:${_TAG}
      - --region=us-central1

# Track the image in build history
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/insightnet-repo/insightnet-backend:${_TAG}

substitutions:
  # Default fallback if COMMIT_SHA is missing (e.g. manual builds)
  _TAG: "latest"

options:
  logging: CLOUD_LOGGING_ONLY
  # This prevents the "not matched in template" error
  substitution_option: "ALLOW_LOOSE"
